name: Update profile art

on:
  schedule:
    - cron: "17 6 * * *" # Runs daily at ~06:17 UTC
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  heatmap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch daily GitHub contributions
        run: python scripts/fetch_contributions.py

      - name: Render updated contribution heatmap SVG
        run: python scripts/render_heatmap_svg.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh contribution graph [skip ci]"
          file_pattern: "data/contributions.json public/contrib-heatmap.svg"
